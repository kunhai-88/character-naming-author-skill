name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install voice audit dependency
        run: python -m pip install --disable-pip-version-check -r skill/requirements-voice.txt
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Validate skill
        run: python scripts/validate_skill.py
      - name: Validate qualitative benchmarks
        run: python scripts/validate_benchmarks.py
      - name: Build package
        run: python scripts/package_skill.py
      - name: Verify archive
        run: python -m zipfile --test dist/character-naming-author.skill
      - name: Upload package
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: character-naming-author-skill
          path: dist/character-naming-author.skill
          if-no-files-found: error
