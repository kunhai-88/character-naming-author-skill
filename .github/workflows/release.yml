name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install voice audit dependency
        run: python -m pip install --disable-pip-version-check -r skill/requirements-voice.txt
      - name: Test
        run: python -m unittest discover -s tests -v
      - name: Validate and package
        run: |
          python scripts/validate_benchmarks.py
          python scripts/package_skill.py
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/character-naming-author.skill --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
