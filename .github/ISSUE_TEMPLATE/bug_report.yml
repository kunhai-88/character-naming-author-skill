name: Bug report
description: 报告可复现的 Skill、脚本或文档问题
title: "[Bug]: "
labels: [bug]
body:
  - type: checkboxes
    attributes:
      label: 提交前检查
      options:
        - label: 我已搜索现有 Issues，确认没有重复报告。
          required: true
        - label: 示例不包含私人剧本、真实个人信息或未授权内容。
          required: true
  - type: textarea
    attributes:
      label: 问题描述
      description: 实际发生了什么？你原本期待什么？
    validations:
      required: true
  - type: textarea
    attributes:
      label: 最小复现
      description: 提供匿名化输入、执行命令和完整输出。
    validations:
      required: true
  - type: input
    attributes:
      label: 版本
      placeholder: v0.1.0 或 commit SHA
    validations:
      required: true
  - type: input
    attributes:
      label: 环境
      placeholder: Agent / OS / Python version
